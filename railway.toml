# Secondary deploy target: Railway (Docker)
# Primary config: render.yaml — use either platform, not both for production.
#
# Railway setup:
# 1. New Project → Deploy from GitHub repo
# 2. Settings → Builder: Dockerfile, path: Dockerfile
# 3. Variables tab: set env vars from .env.example (Production section)
# 4. Settings → Health Check Path: /api/health

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/api/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
